<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ankahee Hub</title>
<style>
  :root {
    --bg: #FAF6F2;
    --surface: #FFFFFF;
    --primary: #5B4B7C;
    --primary-dark: #443A5E;
    --primary-soft: #EDE8F3;
    --text: #2E2A33;
    --text-muted: #7A7480;
    --border: #E4DDD6;
    --radius: 14px;
    --shadow: 0 2px 10px rgba(46, 42, 51, 0.06);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header img.logo { height: 40px; width: auto; border-radius: 6px; }
  header .title { font-size: 18px; font-weight: 700; color: var(--primary-dark); }
  header .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 16px 60px;
  }
  .intro {
    font-size: 15px;
    color: var(--text-muted);
    margin: 0 0 24px;
  }
  .card-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }
  @media (min-width: 600px) {
    .card-grid { grid-template-columns: 1fr 1fr; }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 22px;
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    min-height: 120px;
  }
  .card:active { transform: scale(0.98); }
  .card.enabled:hover { box-shadow: 0 4px 16px rgba(46,42,51,0.10); }
  .card.disabled {
    opacity: 0.55;
    cursor: default;
    pointer-events: none;
  }
  .card-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--primary-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--primary-dark);
  }
  .card-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .card-tag {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--text-muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 10px;
    width: fit-content;
    margin-top: auto;
  }
</style>
</head>
<body>

<header>
  <img src="Logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
  <div>
    <div class="title">Ankahee Hub</div>
    <div class="subtitle">Pick a tool to get started</div>
  </div>
</header>

<main>

  <div class="card-grid">
    <!-- ============ TOOL 1: CALL LOG (live) ============ -->
    <!-- Replace the href below with your actual GitHub Pages URL for callslog.html -->
    <a class="card enabled" href="https://skrishnakumar00.github.io/Ankahee/callslog.html">
      <div class="card-icon">📞</div>
      <div class="card-title">Log a Call</div>
      <div class="card-desc">Quick call logging — takes less than a minute, right after your call.</div>
    </a>

    <!-- ============ TOOL 2: placeholder ============ -->
    <a class="card disabled" href="#">
      <div class="card-icon">📊</div>
      <div class="card-title">App 2</div>
      <div class="card-desc">Coming soon.</div>
      <div class="card-tag">Coming soon</div>
    </a>

    <!-- ============ TOOL 3: placeholder ============ -->
    <a class="card disabled" href="#">
      <div class="card-icon">🗓️</div>
      <div class="card-title">App 3</div>
      <div class="card-desc">Coming soon.</div>
      <div class="card-tag">Coming soon</div>
    </a>
  </div>
</main>

</body>
</html>
